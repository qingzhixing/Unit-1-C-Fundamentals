hint = '''
如何判断一个数是不是素数 (质数)？

素数是只能被 1 和自身整除的正整数。
判断 n 是否为素数: 从 2 开始试除，如果能整除就不是素数。
优化: 你只需要试除到 sqrt(n) 就够了——想想为什么？

你需要 math.h 中的 sqrt 函数，注意类型转换。

从 100 往回找，找到的第一个素数就是答案。

参考: 本课 README 中的 sqrt 和三层逻辑嵌套。
'''

