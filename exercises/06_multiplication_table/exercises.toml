name = "06_multiplication_table"
title = "嵌套循环: 九九乘法表"
unit = "unit1"
lesson = 6
order = 10
mode = "stdout"
source = "table99.c"
lesson_url = "https://cnb.cool/q.qq/opencamp-c-2026-summer/Unit-1-C-Fundamentals/-/tree/main/lessons/06_multiplication_table"
hint = '''
九九乘法表需要两层嵌套循环——一个循环控制行，一个控制列。

思考:
- 外层循环 i 代表被乘数 (1 到 9)
- 内层循环 j 代表乘数 (从 1 到 i)
- 每项格式是 "j*i=结果"，用制表符 \t 分隔
- 每行结束后换行

仔细观察期望输出中 j 和 i 的顺序——是 j*i 不是 i*j。

参考: 本课 README 中的嵌套循环说明。
'''

[[exercises.cases]]
stdin = ""
stdout = """
1*1=1	
