source = "mystrcpy.c"
lesson_url = "https://cnb.cool/q.qq/opencamp-c-2026-summer/Unit-1-C-Fundamentals/-/tree/main/lessons/16_my_strcpy"
hint = '''
实现自己的字符串复制函数 mystrcpy。

C 程序员的经典写法:
  while (条件) { 复制一个字符; 移动指针; }

更简洁的 C 惯用法是把复制和条件判断合并在一起。
想想: 赋值表达式本身也有返回值!

什么时候停止复制？当遇到字符串的终止符 '\0' 时。

参考: 本课 README 中关于指针和 const 的说明。
'''

